<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>War Thunder Controls</title>
  <link rel="stylesheet" href="sdpi.css" />
  <style>
    body { font-family: sans-serif; margin: 0; padding: 12px; color: #d8d8d8; background: #2d2d2d; }
    h2 { margin: 0 0 8px 0; font-size: 14px; }
    .row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
    label { font-size: 11px; opacity: 0.85; }
    input[type=text] { padding: 6px; background: #1c1c1c; border: 1px solid #444; color: #e8e8e8; border-radius: 3px; font-family: monospace; }
    button { padding: 6px 10px; background: #3d3d3d; border: 1px solid #555; color: #e8e8e8; border-radius: 3px; cursor: pointer; }
    button:hover { background: #4a4a4a; }
    .status { margin-top: 8px; font-size: 11px; padding: 6px; background: #1f1f1f; border-radius: 3px; min-height: 1.4em; }
    .ok { color: #6cd36c; }
    .err { color: #f08080; }
    .hint { font-size: 10px; opacity: 0.65; margin-top: 4px; }
  </style>
</head>
<body>
  <h2>War Thunder controls file (.blk)</h2>

  <div class="row">
    <label for="path">Full path to your <code>controls.blk</code></label>
    <input id="path" type="text" placeholder="C:\Users\You\Documents\My Games\WarThunder\Config\controls.blk" />
    <div class="hint">
      Use the file War Thunder writes when you save controls. This setting is global &mdash; all War Thunder buttons share it.
    </div>
  </div>

  <div class="row">
    <button id="save">Save &amp; reload bindings</button>
  </div>

  <div id="status" class="status">&nbsp;</div>

<script>
let websocket = null;
let pluginUUID = null;

function connectElgatoStreamDeckSocket(inPort, inPluginUUID, inRegisterEvent, inInfo, inActionInfo) {
  pluginUUID = inPluginUUID;
  websocket = new WebSocket("ws://127.0.0.1:" + inPort);

  websocket.onopen = () => {
    websocket.send(JSON.stringify({ event: inRegisterEvent, uuid: inPluginUUID }));
    websocket.send(JSON.stringify({ event: "getGlobalSettings", context: inPluginUUID }));
  };

  websocket.onmessage = (evt) => {
    const data = JSON.parse(evt.data);
    if (data.event === "didReceiveGlobalSettings") {
      const settings = data.payload?.settings || {};
      document.getElementById("path").value = settings.controlsBlkPath || "";
    }
  };
}

function setStatus(msg, kind) {
  const el = document.getElementById("status");
  el.className = "status " + (kind || "");
  el.textContent = msg || " ";
}

document.getElementById("save").addEventListener("click", () => {
  if (!websocket) { setStatus("Not connected to Stream Deck.", "err"); return; }
  const path = document.getElementById("path").value.trim();
  websocket.send(JSON.stringify({
    event: "setGlobalSettings",
    context: pluginUUID,
    payload: { controlsBlkPath: path }
  }));
  setStatus(path ? "Saved. Press your action key to test." : "Cleared.", "ok");
});
</script>
</body>
</html>

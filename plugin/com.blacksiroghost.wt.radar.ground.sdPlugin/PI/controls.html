<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>War Thunder Controls</title>
  <style>
    body { font-family: -apple-system, "Segoe UI", sans-serif; margin: 0; padding: 12px; color: #d8d8d8; background: #2d2d2d; font-size: 12px; }
    h2 { margin: 0 0 4px 0; font-size: 14px; }
    h3 { margin: 18px 0 6px 0; font-size: 12px; color: #f0f0f0; border-bottom: 1px solid #444; padding-bottom: 4px; }
    .row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
    .inline { flex-direction: row; gap: 6px; align-items: center; }
    label { font-size: 11px; opacity: 0.85; }
    input[type=text], select { padding: 6px; background: #1c1c1c; border: 1px solid #444; color: #e8e8e8; border-radius: 3px; font-family: monospace; font-size: 11px; flex: 1 1 auto; min-width: 0; }
    button { padding: 6px 10px; background: #3d3d3d; border: 1px solid #555; color: #e8e8e8; border-radius: 3px; cursor: pointer; font-size: 11px; }
    button:hover { background: #4a4a4a; }
    button.primary { background: #2d5a8a; border-color: #4080c0; }
    button.primary:hover { background: #366cb0; }
    button.success { background: #2d7a3a; border-color: #40a050; }
    .status { margin-top: 6px; font-size: 10px; padding: 6px; background: #1f1f1f; border-radius: 3px; min-height: 1.2em; }
    .ok { color: #6cd36c; }
    .err { color: #f08080; }
    .hint { font-size: 10px; opacity: 0.6; margin-top: 2px; }
    .step-num { display: inline-block; width: 18px; height: 18px; line-height: 18px; text-align: center; background: #2d5a8a; color: white; border-radius: 50%; font-size: 10px; margin-right: 6px; vertical-align: middle; }
    .shared-tag { display: inline-block; background: #2d5a8a; color: white; padding: 2px 6px; border-radius: 8px; font-size: 9px; margin-left: 6px; }
  </style>
</head>
<body>
  <h2>War Thunder &mdash; Setup</h2>

  <h3><span class="step-num">1</span>Controls file (.blk) <span class="shared-tag">SHARED</span></h3>
  <div class="row">
    <label for="path">Path to your <code>controls.blk</code> or <code>machine.blk</code>. Set once &mdash; every War Thunder plugin you install reads this same path.</label>
    <input id="path" type="text" placeholder="%USERPROFILE%\Documents\My Games\WarThunder\Saves\last\production\machine.blk" />
    <div class="hint">Default location: <code>Documents\My Games\WarThunder\Saves\last\production\machine.blk</code></div>
  </div>
  <div class="row inline">
    <button id="browse">Browse&hellip;</button>
    <button id="test">Test</button>
    <button id="save-path" class="primary">Save</button>
    <button id="discover">Auto-detect</button>
  </div>
  <div id="path-status" class="status">&nbsp;</div>

  <h3><span class="step-num">2</span>This button &mdash; fallback key</h3>
  <div class="row">
    <label for="fallback">If this action has no keyboard binding in your <code>.blk</code>, the plugin presses this key instead.</label>
    <select id="fallback">
      <option value="">(none &mdash; alert if unbound)</option>
      <option>F13</option><option>F14</option><option>F15</option><option>F16</option>
      <option>F17</option><option>F18</option><option>F19</option><option>F20</option>
      <option>F21</option><option>F22</option><option>F23</option><option>F24</option>
      <option>ScrollLock</option>
      <option>Pause</option>
    </select>
    <div class="hint">After picking a key here, also bind it in War Thunder for the matching action.</div>
  </div>
  <div class="row inline">
    <button id="save-fb" class="primary">Save fallback key</button>
  </div>
  <div id="fb-status" class="status">&nbsp;</div>

<script>
let websocket = null;
let myUUID = null;
let actionUUID = null;
let actionInfo = null;

function connectElgatoStreamDeckSocket(inPort, inUUID, inRegisterEvent, inInfo, inActionInfo) {
  myUUID = inUUID;
  if (inActionInfo) {
    try {
      actionInfo = (typeof inActionInfo === 'string') ? JSON.parse(inActionInfo) : inActionInfo;
      actionUUID = actionInfo.action;
    } catch (e) {}
  }
  websocket = new WebSocket("ws://127.0.0.1:" + inPort);

  websocket.onopen = () => {
    websocket.send(JSON.stringify({ event: inRegisterEvent, uuid: inUUID }));
    websocket.send(JSON.stringify({ event: "getGlobalSettings", context: inUUID }));
    websocket.send(JSON.stringify({ event: "getSettings", context: inUUID }));
  };

  websocket.onmessage = (evt) => {
    const data = JSON.parse(evt.data);
    if (data.event === "didReceiveGlobalSettings") {
      const s = data.payload?.settings || {};
      if (!document.getElementById("path").value) {
        document.getElementById("path").value = s.controlsBlkPath || "";
      }
      if (s.controlsBlkPath) setPathStatus("Saved.", "ok");
    }
    if (data.event === "didReceiveSettings") {
      const s = data.payload?.settings || {};
      document.getElementById("fallback").value = s.fallbackKey || "";
    }
    if (data.event === "sendToPropertyInspector") {
      const p = data.payload || {};
      if (p.type === "browseResult") {
        document.getElementById("path").value = p.path;
        setPathStatus("Picked: <code>" + p.path + "</code> &mdash; click <b>Test</b> or <b>Save</b>.", "ok");
      } else if (p.type === "browseCancelled") {
        setPathStatus("Browse cancelled.", "");
      } else if (p.type === "testResult") {
        setPathStatus(p.message, p.ok ? "ok" : "err");
      } else if (p.type === "pathSaved") {
        setPathStatus("Saved. All War Thunder plugins now use <code>" + (p.path || "(auto-detect)") + "</code>.", "ok");
      }
    }
  };
}

function setPathStatus(msg, kind) {
  const el = document.getElementById("path-status");
  el.className = "status " + (kind || "");
  el.innerHTML = msg || "&nbsp;";
}
function setFbStatus(msg, kind) {
  const el = document.getElementById("fb-status");
  el.className = "status " + (kind || "");
  el.innerHTML = msg || "&nbsp;";
}

function sendToPlugin(payload) {
  if (!websocket || !actionUUID) return;
  websocket.send(JSON.stringify({
    action: actionUUID,
    event: "sendToPlugin",
    context: myUUID,
    payload
  }));
}

document.getElementById("browse").addEventListener("click", () => {
  setPathStatus("Opening file picker&hellip;", "");
  sendToPlugin({ type: "browse" });
});

document.getElementById("test").addEventListener("click", () => {
  const path = document.getElementById("path").value.trim();
  setPathStatus("Testing&hellip;", "");
  sendToPlugin({ type: "test", path });
});

document.getElementById("save-path").addEventListener("click", () => {
  if (!websocket) return;
  const path = document.getElementById("path").value.trim();
  // Write per-plugin global (Stream Deck-side) AND shared file (cross-plugin).
  websocket.send(JSON.stringify({
    event: "setGlobalSettings",
    context: myUUID,
    payload: { controlsBlkPath: path }
  }));
  sendToPlugin({ type: "setPath", path });
});

document.getElementById("discover").addEventListener("click", () => {
  if (!websocket) return;
  websocket.send(JSON.stringify({
    event: "setGlobalSettings",
    context: myUUID,
    payload: { controlsBlkPath: "" }
  }));
  sendToPlugin({ type: "setPath", path: "" });
  document.getElementById("path").value = "";
  setPathStatus("Cleared &mdash; the plugin will use the auto-detected path.", "ok");
});

document.getElementById("save-fb").addEventListener("click", () => {
  if (!websocket) return;
  const fallbackKey = document.getElementById("fallback").value;
  websocket.send(JSON.stringify({
    event: "setSettings",
    context: myUUID,
    payload: { fallbackKey: fallbackKey || null }
  }));
  setFbStatus(fallbackKey
    ? `Saved. Now bind <b>${fallbackKey}</b> in War Thunder for this action.`
    : "Cleared. Press without a .blk binding will show an alert.",
    "ok");
});
</script>
</body>
</html>

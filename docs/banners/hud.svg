<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 88" width="760" height="88" role="img" aria-label="HUD &amp; System - 17 actions">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2a2e"/>
      <stop offset="1" stop-color="#15151a"/>
    </linearGradient>
    <linearGradient id="stripe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#A0A0AC"/>
      <stop offset="1" stop-color="#808090"/>
    </linearGradient>
  </defs>
  <rect width="760" height="88" rx="12" fill="url(#bg)"/>
  <rect width="760" height="88" rx="12" fill="none" stroke="#3a3a40" stroke-width="1"/>
  <rect x="0" y="0" width="8" height="88" rx="0" fill="url(#stripe)"/>
  <rect x="0" y="0" width="12" height="88" fill="url(#stripe)" opacity="0.0"/>
  <text x="32" y="38" font-family="-apple-system, Segoe UI, system-ui, sans-serif" font-weight="700" font-size="22" fill="#ffffff" letter-spacing="0.2">HUD &amp; System</text>
  <text x="32" y="62" font-family="-apple-system, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="13" fill="#9ca0a6">Hide HUD, pause, screenshot, flight menu, MP stats, action bars, control mode.</text>
  <text x="732" y="40" text-anchor="end" font-family="-apple-system, Segoe UI, system-ui, sans-serif" font-weight="700" font-size="34" fill="#808090">17</text>
  <text x="732" y="60" text-anchor="end" font-family="-apple-system, Segoe UI, system-ui, sans-serif" font-weight="600" font-size="11" fill="#9ca0a6" letter-spacing="1.5">ACTIONS</text>
</svg>
